<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizador · Vino en Grupo</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>🍷 Vino en Grupo</h1>
    <nav>
      <a href="/">Inicio</a>
      <a href="/ingest.html">Ingesta</a>
      <a href="/shop.html">Comprar</a>
      <a href="/admin.html" class="active">Organizador</a>
    </nav>
  </header>
  <main>
    <h2>Panel del organizador</h2>

    <div id="activeCampaignSection" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px;">
      <h3>Active Campaign</h3>
      <p id="activeCampaignInfo">Loading...</p>
      <button id="createCampaignBtn" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Create Campaign
      </button>
      <div id="createCampaignError" style="color: red; margin-top: 10px; display: none;"></div>
      <div id="createCampaignSuccess" style="color: green; margin-top: 10px; display: none;"></div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="campaign">N° de campaña</label>
          <input type="number" id="campaign" placeholder="1" />
        </div>
        <div style="flex:0;"><button id="load">Cargar</button></div>
      </div>
      <div id="msg"></div>
    </div>

    <div class="card" id="rollupCard" style="display:none;">
      <h3>Roll-up · qué comprarle al proveedor</h3>
      <div id="rollup"></div>
    </div>

    <div class="card" id="distCard" style="display:none;">
      <h3>Distribución · qué entregar y cobrar a cada uno</h3>
      <div id="dist"></div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const money = (n) => "$" + n.toLocaleString("es-AR");
    let campaignId = null;

    const params = new URLSearchParams(location.search);
    if (params.get("campaign")) $("campaign").value = params.get("campaign");

    $("load").addEventListener("click", load);

    async function getActiveCampaignFromAPI() {
      const response = await fetch('/campaigns/active');
      if (!response.ok) throw new Error('No active campaign');
      return response.json();
    }

    function getTimeSince(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);

      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    async function loadActiveCampaign() {
      try {
        const activeCampaign = await getActiveCampaignFromAPI();
        const createdAgo = getTimeSince(activeCampaign.createdAt);
        document.getElementById('activeCampaignInfo').textContent =
          `${activeCampaign.name} (created ${createdAgo}, ${activeCampaign.status})`;
      } catch (e) {
        document.getElementById('activeCampaignInfo').textContent = 'No campaign created yet';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadActiveCampaign();

      document.getElementById('createCampaignBtn').addEventListener('click', async () => {
        try {
          const response = await fetch('/campaigns', { method: 'POST', body: '{}' });
          if (!response.ok) throw new Error('Failed to create campaign');

          document.getElementById('createCampaignError').style.display = 'none';
          document.getElementById('createCampaignSuccess').style.display = 'block';
          document.getElementById('createCampaignSuccess').textContent = 'Campaign created!';

          setTimeout(() => {
            loadActiveCampaign();
            document.getElementById('createCampaignSuccess').style.display = 'none';
          }, 2000);
        } catch (error) {
          document.getElementById('createCampaignError').style.display = 'block';
          document.getElementById('createCampaignError').textContent = `Error: ${error.message}`;
        }
      });
    });

    async function load() {
      campaignId = $("campaign").value;
      if (!campaignId) return;
      const r = await fetch("/campaigns/" + campaignId + "/rollup");
      if (!r.ok) { $("msg").innerHTML = '<div class="notice err">Campaña no encontrada.</div>'; return; }
      $("msg").innerHTML = "";
      renderRollup(await r.json());
      renderDist(await (await fetch("/campaigns/" + campaignId + "/distribution")).json());
    }

    function renderRollup(rows) {
      $("rollupCard").style.display = "block";
      if (!rows.length) { $("rollup").innerHTML = '<p class="muted">Sin items.</p>'; return; }
      const trs = rows.map((r) =>
        "<tr><td>" + r.bodega + " · " + r.vino + "</td>" +
        "<td class='num'>" + r.totalBotellas + "</td>" +
        "<td class='num'>" + r.cajas + " <span class='muted'>(x" + r.unidadesPorCaja + ")</span></td>" +
        "<td class='num'>" + money(r.precioUnitario) + "</td>" +
        "<td class='num'>" + money(r.totalEstimado) + "</td></tr>"
      ).join("");
      const total = rows.reduce((s, r) => s + r.totalEstimado, 0);
      $("rollup").innerHTML =
        "<table><thead><tr><th>Vino</th><th class='num'>Botellas</th><th class='num'>Cajas</th>" +
        "<th class='num'>Precio</th><th class='num'>Total</th></tr></thead><tbody>" + trs +
        "</tbody><tfoot><tr><th colspan='4'>Total estimado de la compra</th>" +
        "<th class='num total'>" + money(total) + "</th></tr></tfoot></table>";
    }

    function renderDist(rows) {
      $("distCard").style.display = "block";
      if (!rows.length) { $("dist").innerHTML = '<p class="muted">Nadie pidió todavía.</p>'; return; }
      $("dist").innerHTML = rows.map((d) => {
        const lines = d.lines.map((l) => l.qty + "× " + l.vino).join(", ") || "—";
        const payPill = d.paid
          ? '<span class="pill paid">pagado</span>'
          : '<span class="pill unpaid">sin pagar</span>';
        const statusPill = '<span class="pill ' + d.status + '">' + d.status + "</span>";
        return (
          '<div class="card" style="margin:0.6rem 0; padding:0.9rem 1rem;">' +
          "<strong>" + d.userName + "</strong> " + statusPill + " " + payPill +
          '<div class="muted" style="margin:0.3rem 0;">' + lines + "</div>" +
          '<div class="row" style="align-items:center; justify-content:space-between;">' +
          '<span class="total">' + money(d.subtotal) + "</span>" +
          '<button class="small ' + (d.paid ? "ghost" : "") + '" data-pay="' + d.orderId + '" data-val="' + (!d.paid) + '">' +
          (d.paid ? "Marcar sin pagar" : "Marcar pagado") + "</button></div></div>"
        );
      }).join("");
      document.querySelectorAll("[data-pay]").forEach((b) =>
        b.onclick = async () => {
          await fetch("/orders/" + b.dataset.pay + "/payment", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ paid: b.dataset.val === "true" }),
          });
          load();
        });
    }
  </script>
</body>
</html>
